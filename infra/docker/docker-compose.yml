services:
  postgres:
    image: postgres:16-alpine
    container_name: rnfe-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rnfe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rnfe} -d ${POSTGRES_DB:-rnfe}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:4
    container_name: rnfe-adminer
    restart: unless-stopped
    profiles: ["admin"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"

volumes:
  rnfe_pgdata:
