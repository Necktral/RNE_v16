# Benchmark Configuration: 1x1 vs 5x5 Comparative Experiment
#
# This configuration defines the experimental protocol for measuring
# net cognitive gain of 5x5 GridThermalScenario vs 1x1 baseline.

# Baseline Comparison (Homogeneous)
baseline:
  scenarios:
    - name: grid_thermal_1x1
      grid_size: 1
      initial_temperature: 0.82
      alarm_threshold: 0.85
      cooling_effect: 0.07
      topology: null  # N/A for 1x1

    - name: grid_thermal_5x5_uniform
      grid_size: 5
      initial_temperature: 0.82
      alarm_threshold: 0.85
      cooling_effect: 0.07
      topology: uniform  # Baseline homogeneous

  episodes_per_scenario: 100
  base_seed: 42
  max_steps: 50

# Heterogeneous 5x5 (Topological Diversity)
heterogeneous_5x5:
  scenario_base:
    name: grid_thermal_5x5_hetero
    grid_size: 5
    initial_temperature: 0.82
    alarm_threshold: 0.85
    cooling_effect: 0.07

  topology_distribution:
    uniform: 20
    hotspot_center: 20
    gradient_ns: 20
    gradient_ew: 20
    checkerboard: 20

  base_seed: 1000
  max_steps: 50

# Level Sweep (Robustness Across World Levels)
level_sweep:
  scenarios:
    - name: SAFE
      initial_temperature: 0.60
      alarm_threshold: 0.85
      episodes: 25

    - name: ELEVATED
      initial_temperature: 0.78
      alarm_threshold: 0.85
      episodes: 25

    - name: WARNING
      initial_temperature: 0.87
      alarm_threshold: 0.85
      episodes: 25

    - name: CRITICAL
      initial_temperature: 0.95
      alarm_threshold: 0.85
      episodes: 25

  grid_sizes: [1, 5]
  cooling_effect: 0.07
  base_seed: 2000
  max_steps: 50

# Statistical Analysis Configuration
analysis:
  bootstrap_samples: 1000
  confidence_level: 0.95
  effect_size_threshold: 0.3  # Cohen's d minimum for "practical significance"

  # Metrics to compare
  primary_metrics:
    - cierre_rate
    - continuity_score
    - intervention_precision
    - proposition_diversity
    - spatial_information_usage
    - ivc_r

  cost_metrics:
    - wall_time_ms
    - artifact_size_bytes
    - memory_pressure_mb

  # Minimum improvement thresholds
  thresholds:
    intervention_precision_min_improvement: 0.08  # 8%
    cierre_rate_max_degradation: 0.03  # -3%
    wall_time_max_ratio: 2.0  # 2x
    artifact_size_max_ratio: 3.0  # 3x
    ivc_r_min_improvement: 0.08  # 8%

# Output Configuration
output:
  root_dir: benchmark_results
  create_traces: false  # Set to true for detailed trace files (large)
  create_plots: true
  report_format: markdown
